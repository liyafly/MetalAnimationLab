name: MetalAnimationLabmacOS
options:
  bundleIdPrefix: com.liyafly
  deploymentTarget:
    macOS: "14.0"
packages:
  MetalAnimationLab:
    path: ../..
targets:
  MetalAnimationLabmacOS:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: MetalAnimationLab
        product: LabSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liyafly.MetalAnimationLab.macOS
        PRODUCT_NAME: MetalAnimationLab
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MetalAnimationLab
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
schemes:
  MetalAnimationLabmacOS:
    build:
      targets:
        MetalAnimationLabmacOS: all
    run:
      config: Debug
    test:
      config: Debug

