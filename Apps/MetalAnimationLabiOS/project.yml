name: MetalAnimationLabiOS
options:
  bundleIdPrefix: com.liyafly
  deploymentTarget:
    iOS: "17.0"
packages:
  MetalAnimationLab:
    path: ../..
targets:
  MetalAnimationLabiOS:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: MetalAnimationLab
        product: LabSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liyafly.MetalAnimationLab
        PRODUCT_NAME: MetalAnimationLab
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MetalAnimationLab
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        CODE_SIGN_STYLE: Automatic
schemes:
  MetalAnimationLabiOS:
    build:
      targets:
        MetalAnimationLabiOS: all
    run:
      config: Debug
    test:
      config: Debug

